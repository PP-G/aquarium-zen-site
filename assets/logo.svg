<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Pixel-art fish facing LEFT (matching app icon) -->
  <!-- Dorsal fin -->
  <rect x="26" y="14" width="6" height="5" fill="white"/>
  <!-- Body row 1 (top) -->
  <rect x="14" y="19" width="24" height="5" fill="white"/>
  <!-- Body row 2 (eye row) -->
  <rect x="10" y="24" width="28" height="5" fill="white"/>
  <!-- Body row 3 -->
  <rect x="10" y="29" width="28" height="5" fill="white"/>
  <!-- Body row 4 -->
  <rect x="14" y="34" width="24" height="5" fill="white"/>
  <!-- Body row 5 (chin) -->
  <rect x="18" y="39" width="14" height="5" fill="white"/>
  <!-- Tail top prong -->
  <rect x="38" y="22" width="10" height="5" fill="white"/>
  <!-- Tail bottom prong -->
  <rect x="38" y="32" width="10" height="5" fill="white"/>
  <!-- Eye (black circle) -->
  <circle cx="18" cy="28" r="3.5" fill="black"/>
  <!-- Eye highlight (white dot) -->
  <circle cx="17" cy="27" r="1.2" fill="white"/>
</svg>
